services:
  - type: web
    name: workforce-task-management-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: FRONTEND_APP_ORIGIN
        sync: false
      - key: SUPABASE_PROJECT_REF
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: DEMO_USER_PASSWORD
        sync: false
